import java.nio.file.Files

ext.generateNgramsMetadata = { definitionsInputDir, dictionariesInputDir, iconsDir, ngramsInputDir, ngramsMetaDir ->
	def errorStream = fileTree(dir: definitionsInputDir).getFiles().parallelStream().map { definition ->
		if (!definition.name.endsWith("yml")) {
			return ""
		}

		def (ignore1, ignore2, ignore3, ignore4, ignore5, dictionaryFile, ignore7, langFileErrorMsg) = parseLanguageDefintion(definition, dictionariesInputDir, iconsDir)
		if (!langFileErrorMsg.isEmpty()) {
			return langFileErrorMsg
		}

		def errorMessage = generateMetadata(dictionaryFile, ngramsInputDir, ngramsMetaDir)
		if (!errorMessage.isEmpty()) {
			return errorMessage
		}

		return ""
	}

	String errorsMsg = errorStream.reduce("", String::concat)
	if (errorsMsg) {
		throw new GradleException(errorsMsg)
	}
}


ext.linkNgramFiles = { String inputDir, String outputDir ->
	def srcDir  = new File(inputDir)
	def destDir = new File(outputDir)
	destDir.mkdirs()

	srcDir.listFiles({ f -> f.name.endsWith('ngrams.zip') } as FileFilter)?.each { src ->
		def dest = new File(destDir, src.name)
		def link = dest.toPath()
		def target = link.parent.relativize(src.toPath())

		Files.deleteIfExists(link)
		Files.createSymbolicLink(link, target)
	}
}


// this cannot be static, because it requires access to exec()
def generateMetadata(File dictionaryFile, String ngramsInputDir, String ngramsMetaDir) {
	def filename = dictionaryFile.name.substring(0, dictionaryFile.name.lastIndexOf('.')).replace("-utf8", "") + "-ngrams"

	try {
		def ngramFile = new File("${ngramsInputDir}/${filename}.zip")
		def revision = ngramFile.exists() ? exec("git log --pretty=tformat:%H -n 1 ${ngramFile}") : ""
		new File(ngramsMetaDir, "${filename}.props.yml").text = "revision: ${revision}"

		return ""
	} catch (Exception e) {
		return "Failed writing ngram properties to: '${ngramsMetaDir}/${filename}'. ${e.message}\n"
	}
}
