ext.generateNgramsMetadata = { definitionsInputDir, dictionariesInputDir, iconsDir, ngramsInputDir, ngramsMetaDir ->
	def errorStream = fileTree(dir: definitionsInputDir).getFiles().parallelStream().map { definition ->
		if (!definition.name.endsWith("yml")) {
			return ""
		}

		def (ignore1, ignore2, ignore3, ignore4, ignore5, ignore6, ngramFile, ignore7, langFileErrorMsg) = parseLanguageDefintion(definition, dictionariesInputDir, iconsDir, ngramsInputDir)
		if (!langFileErrorMsg.isEmpty()) {
			return langFileErrorMsg
		}

		def errorMessage = generateMetadata(ngramFile, ngramsMetaDir)
		if (!errorMessage.isEmpty()) {
			return errorMessage
		}

		return ""
	}

	String errorsMsg = errorStream.reduce("", String::concat)
	if (errorsMsg) {
		throw new GradleException(errorsMsg)
	}
}

// this cannot be static, because it requires access to exec()
def generateMetadata(File ngramFile, String ngramsMetaDir) {
	if (ngramFile == null) {
		return ""
	}

	def filename = ngramFile.name.replaceFirst("\\.zip\$", ".props.yml")

	try {
		def revision = ngramFile.exists() ? exec("git log --pretty=tformat:%H -n 1 ${ngramFile}") : ""
		new File(ngramsMetaDir, filename).text = "revision: ${revision}"

		return ""
	} catch (Exception e) {
		return "Failed writing ngram properties to: '${ngramsMetaDir}/${filename}'. ${e.message}\n"
	}
}
